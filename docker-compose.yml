services:
  mysql-primary:
    image: mysql:8.4
    container_name: mysql-primary
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33050:3306"
    volumes:
      - primary-data:/var/lib/mysql
      - ./primary/my.cnf:/etc/my.cnf

  mysql-replica:
    image: mysql:8.4
    container_name: mysql-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33051:3306"
    volumes:
      - replica-data:/var/lib/mysql
      - ./replica/my.cnf:/etc/my.cnf

  mysqld-exporter-primary:
    image: prom/mysqld-exporter
    container_name: mysqld-exporter-primary
    restart: unless-stopped
    ports:
      - "9104:9104"
    command:
      - "--mysqld.username=root:root"
      - "--mysqld.address=mysql-primary:3306"
    depends_on:
      - mysql-primary

  mysqld-exporter-replica:
    image: prom/mysqld-exporter
    container_name: mysqld-exporter-replica
    restart: unless-stopped
    ports:
      - "9105:9104"
    command:
      - "--mysqld.username=root:root"
      - "--mysqld.address=mysql-replica:3306"
    depends_on:
      - mysql-replica

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  primary-data:
  replica-data: